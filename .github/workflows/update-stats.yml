name: Generate GitHub Stats

on:
  schedule:
  
    - cron: "0 0 * * *"
  workflow_dispatch: 

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate GitHub Stats
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=n0namedeveloper&show_icons=true&theme=dark&hide_border=true
          path: profile/stats.svg 

      - name: Commit & Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update github stats"
          file_pattern: profile/stats.svg
